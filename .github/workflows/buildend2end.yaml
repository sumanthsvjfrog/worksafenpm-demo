name: "worksafenpmdock"
on: workflow_dispatch

# This is required as per
# https://docs.github.com/en/actions/deployment/security-hardening-your-deployments/configuring-openid-connect-in-cloud-providers#adding-permissions-settings
permissions:
  id-token: write
  contents: read

jobs:
  build:
     runs-on: ubuntu-latest
     env:
      OIDC_PROVIDER: 'sumanthsvjfrog/worksafenpm-demo@github'
      PLATFORM_REPO: 'worksafeperm-npm-virt-demo'
      BUILD_NAME: "worksafe-npmdock-build"
      BUILD_ID: "${{github.run_number}}"
      DOCKER_REPO: "worksafeperm-docker-virtual"
      IMAGE_NAME: "worksafenpm-dockerbuild"
      IMAGE_TAG: "${{github.run_number}}"

     steps:
       - name: Checkout
         uses: actions/checkout@v3
              
       - name: Setup Node npm
         uses: actions/setup-node@v3
   
       - name: Setup JFrog CLI
         uses: jfrog/setup-jfrog-cli@v4
         env:  
           JF_URL: https://psblr.jfrog.io
         with:
           oidc-provider-name: ${{ env.OIDC_PROVIDER }}


       - name: Set CLI Config
         run: jf npm-config --repo-resolve=$PLATFORM_REPO --repo-deploy=$PLATFORM_REPO

       - name: Run Audit scan for the git workspace
         run: jf audit --watches worksafeperm-high-sec-local --fail=false
 
       - name: Install Dependencies
         run: jf npm install --build-name=${{env.BUILD_NAME}} --build-number=${{env.BUILD_ID}} --project=worksafeperm
         
       - name: Publish
         run: jf npm publish --build-name=${{env.BUILD_NAME}} --build-number=${{env.BUILD_ID}} --project=worksafeperm


      # ── Docker Build ──────────────────────────────────────────────────────
       - name: Docker Build
         run: |
           jf docker build -t psblr.jfrog.io/${{ env.DOCKER_REPO }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} .  --project=worksafeperm

      # ── Docker Scan ───────────────────────────────────────────────────────
       - name: Docker Scan
         run: |
           jf docker scan psblr.jfrog.io/${{ env.DOCKER_REPO }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} --watches worksafe-sec-watch --fail=false

      # ── Docker Push ───────────────────────────────────────────────────────
       - name: Docker Push
         run: |
           jf docker push psblr.jfrog.io/${{ env.DOCKER_REPO }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} --build-name=${{ env.BUILD_NAME }} --build-number=${{ env.BUILD_ID }} --project=worksafeperm

      # ── Publish Build Info ────────────────────────────────────────────────
       - name: Get Build Info Details
         run: |
           jf rt bag "${{ env.BUILD_NAME }}" "${{ env.BUILD_ID }}" --project=worksafeperm
           jf rt bce "${{ env.BUILD_NAME }}" "${{ env.BUILD_ID }}" --project=worksafeperm
    
       
       - name: Publish build-info to Artifactory
         run: |
           jf rt bp ${{env.BUILD_NAME}} ${{ env.BUILD_ID }} --project=worksafeperm
          
       - name: Perform build scan
         run: |   
           jf bs ${{env.BUILD_NAME}} ${{ env.BUILD_ID }} --project=worksafeperm
